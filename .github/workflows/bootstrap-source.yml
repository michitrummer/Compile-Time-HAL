name: Bootstrap source tree

on:
  push:
    paths:
      - 'bootstrap/**'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check readiness
        id: ready
        shell: bash
        run: |
          if [[ -f bootstrap/READY ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Expand source archive
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          cat bootstrap/source.part* | base64 --decode > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz
          rm -rf bootstrap .github/workflows/bootstrap-source.yml
      - name: Commit source tree
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Rev11 source code"
          git push origin HEAD:main
