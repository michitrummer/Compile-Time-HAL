name: Bootstrap source tree

on:
  push:
    paths:
      - 'bootstrap/READY'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand verified Rev11 project source
        shell: bash
        run: |
          base64 --decode bootstrap/rev11-src.b64 > /tmp/rev11-src.tar.gz
          echo "6d8d03e0f9b0c60a9daedc0f23f74bc5230be588895be306fa9a9d29cafb6308  /tmp/rev11-src.tar.gz" | sha256sum --check
          tar -xzf /tmp/rev11-src.tar.gz

      - name: Restore STM32CubeL4 v1.18.2 drivers
        shell: bash
        run: |
          git clone --recursive --depth 1 --branch v1.18.2 \
            https://github.com/STMicroelectronics/STM32CubeL4.git /tmp/STM32CubeL4
          mkdir -p CubeMXHAL CubeMXLL
          cp -a /tmp/STM32CubeL4/Drivers CubeMXHAL/Drivers
          cp -a /tmp/STM32CubeL4/Drivers CubeMXLL/Drivers

      - name: Remove bootstrap files
        shell: bash
        run: |
          rm -rf bootstrap .github/workflows/bootstrap-source.yml

      - name: Commit source tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Rev11 source code"
          git push origin HEAD:main
