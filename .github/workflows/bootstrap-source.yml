name: Bootstrap Rev11 source tree

on:
  workflow_dispatch:
  push:
    paths:
      - 'bootstrap/READY'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify Rev11 project source
        shell: bash
        run: |
          : > bootstrap/rev11-src.tar.xz
          for part in bootstrap/rev11-xz-part*.b64; do
            base64 --decode "$part" >> bootstrap/rev11-src.tar.xz
          done
          echo "75670f204ce8d7d79fac7f9cc3ec8e6538111aea3076f44a970470434be75d23  bootstrap/rev11-src.tar.xz" | sha256sum --check
          xz -t bootstrap/rev11-src.tar.xz
          tar -xJf bootstrap/rev11-src.tar.xz
          echo "cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30  LICENSE" | sha256sum --check
          echo "c94f88f5f50ca9582942584e0b15322b50edd31c2dae73b5fdca1f9580e18cc2  NOTICE" | sha256sum --check
          echo "2d8dad2737325531d8866b2724870b242d7a90b65b4ae5fb9c01063b08aad7c1  LICENSE_SCOPE.md" | sha256sum --check
          echo "0df580fe628edc4663eef69216b770dde4accb6e3c9b513bb523d071c46d4cdb  CT-HAL23/csl/include/GpioConfig.h" | sha256sum --check
          echo "49a7794f738c0c12f42f845e3dbc00ca9d3a6dac4b0eb89c29e4f2cea9b2d15b  CPPCTHAL/csl/include/GpioConfig.h" | sha256sum --check
          echo "076f49f6f3a7b990c428b28a6329b72728854c8526c460d961a4622bfde35292  Examples/Single/cthal23.cpp" | sha256sum --check
          echo "5f4d6955558958ef90a230ca627e1739ea2244de290e5af0cdfd057a61775b15  Examples/MultiExCall/cppcthal.cpp" | sha256sum --check

      - name: Restore STM32CubeL4 v1.18.2 drivers
        shell: bash
        run: |
          git clone --recursive --depth 1 --branch v1.18.2 \
            https://github.com/STMicroelectronics/STM32CubeL4.git /tmp/STM32CubeL4
          mkdir -p CubeMXHAL CubeMXLL
          cp -a /tmp/STM32CubeL4/Drivers CubeMXHAL/Drivers
          cp -a /tmp/STM32CubeL4/Drivers CubeMXLL/Drivers

      - name: Remove bootstrap files
        shell: bash
        run: |
          rm -rf bootstrap .github/workflows/bootstrap-source.yml

      - name: Commit source tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Rev11 source code"
          git push origin HEAD:main
